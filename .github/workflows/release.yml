name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run quality checks
        run: deno task quality

  build:
    name: Build (${{ matrix.platform }})
    needs: quality
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-latest
            deno_version: v2.x
            target: aarch64-apple-darwin
            artifact: modmux-darwin-arm64
          - platform: darwin-x64
            runner: macos-15-intel
            deno_version: v2.x
            target: x86_64-apple-darwin
            artifact: modmux-darwin-x64
          - platform: linux-x64
            runner: ubuntu-latest
            deno_version: v2.x
            target: x86_64-unknown-linux-gnu
            artifact: modmux-linux-x64
          - platform: linux-arm64
            runner: ubuntu-latest
            deno_version: v2.x
            target: aarch64-unknown-linux-gnu
            artifact: modmux-linux-arm64
          - platform: windows-x64
            runner: windows-latest
            deno_version: v2.x
            target: x86_64-pc-windows-msvc
            artifact: modmux-windows-x64.exe
          - platform: windows-arm64
            runner: windows-11-arm
            deno_version: v2.x
            target: ""
            artifact: modmux-windows-arm64.exe
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno_version }}
      - uses: actions/cache@v5
        with:
          path: ~/.deno
          key: deno-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('deno.lock') }}
      - name: Sync version
        run: deno run -A scripts/sync-version.ts
      - name: Compile binary
        env:
          DENO_TARGET: ${{ matrix.target }}
          OUTPUT_FILE_NAME: ${{ matrix.artifact }}
        run: deno task compile
      - name: Verify ARM64 binary
        if: matrix.platform == 'windows-arm64'
        shell: pwsh
        run: |
          $path = "${{ matrix.artifact }}"
          $bytes = [System.IO.File]::ReadAllBytes($path)
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
          $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          if ($machine -ne 0xAA64) {
            throw ("Expected ARM64 PE machine 0xAA64, got 0x{0:X4}" -f $machine)
          }
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      prerelease: ${{ steps.detect.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: modmux-*
          merge-multiple: true
      - name: Detect pre-release
        id: detect
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate changelog
        id: changelog
        uses: loopwerk/tag-changelog@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate release manifest
        run: |
          VERSION=$(python3 -c "import sys,json; print(json.load(open('deno.json'))['version'])")
          TAG="${{ github.ref_name }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          CHECKSUMS="["
          FIRST=true
          for f in modmux-*; do
            SHA256=$(sha256sum "$f" | awk '{print $1}')
            PLATFORM="${f#modmux-}"
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${f}"
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              CHECKSUMS="${CHECKSUMS},"
            fi
            CHECKSUMS="${CHECKSUMS}{\"platform\":\"${PLATFORM}\",\"filename\":\"${f}\",\"downloadUrl\":\"${DOWNLOAD_URL}\",\"sha256\":\"${SHA256}\"}"
          done
          CHECKSUMS="${CHECKSUMS}]"

          cat > release-manifest.json <<EOF
          {
            "version": "${VERSION}",
            "tag": "${TAG}",
            "publishedAt": "${TIMESTAMP}",
            "binaries": ${CHECKSUMS}
          }
          EOF

          echo "Generated release-manifest.json:"
          cat release-manifest.json
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            modmux-*
            release-manifest.json
          body: ${{ steps.changelog.outputs.changes }}
          prerelease: ${{ steps.detect.outputs.prerelease == 'true' }}
